# ==============================================================================
# Host Nginx Configuration Template
# Place this file at '/etc/nginx/sites-available/attendance.conf' on your Ubuntu Server.
# Link it using: 'sudo ln -s /etc/nginx/sites-available/attendance.conf /etc/nginx/sites-enabled/'
# ==============================================================================

server {
    # Listen on HTTP port 80.
    listen 80;
    
    # Replace this with your server's domain name (e.g. pulse.example.com) or local IP (e.g. 192.168.1.100).
    # If using local setup, '_' acts as a wildcard catch-all for any host.
    server_name _;

    # Maximum file upload size (needed for uploading large templates/files).
    client_max_body_size 10M;

    # ----------------------------------------------------------------------------
    # 1. API REVERSE PROXY
    # ----------------------------------------------------------------------------
    # Forward all requests starting with '/api' to the Spring Boot backend container.
    location /api {
        # Forward requests to the backend container listening on port 8080.
        proxy_pass http://127.0.0.1:8080;
        
        # Pass the original host header from the client (e.g. pulse.example.com) to the backend.
        # This keeps URLs generated by Spring Boot (redirects, links) matching the client's address.
        proxy_set_header Host $host;
        
        # Pass the real client IP to the backend (Spring Security/Logs need this).
        proxy_set_header X-Real-IP $remote_addr;
        
        # Forwarded-For list keeps track of all proxy hops.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Pass the original scheme (HTTP or HTTPS) so Spring Boot knows if it's secure.
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard proxy timeouts.
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ----------------------------------------------------------------------------
    # 2. WEBSOCKET REVERSE PROXY
    # ----------------------------------------------------------------------------
    # Forward real-time WebSocket requests (starting with '/ws') to Spring Boot.
    # WebSockets require a protocol upgrade from HTTP to WebSockets.
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        
        # Protocol upgrade headers (critical for WebSocket connection handshake).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Pass standard client headers.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets require longer read timeouts so Nginx doesn't close idle connections.
        # This keeps the connection alive for up to 10 minutes without activity.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ----------------------------------------------------------------------------
    # 3. FRONTEND STATIC FILE PROXY
    # ----------------------------------------------------------------------------
    # Forward all other traffic (routes, index.html, static JS/CSS) to the Nginx frontend container.
    location / {
        # Forward requests to the frontend Nginx container running on port 3000.
        proxy_pass http://127.0.0.1:3000;
        
        # Standard proxy headers.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
