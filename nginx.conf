server {
    # Listen on port 80 inside the container.
    listen 80;
    
    # Define the hostname. 'localhost' is default.
    server_name localhost;

    # Set the root directory for serving files to Nginx's HTML root.
    root /usr/share/nginx/html;
    
    # Set default index files to serve.
    index index.html index.htm;

    # Gzip Compression to optimize loading speed of static assets in the browser
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Primary routing configuration for Single Page Applications (SPAs)
    location / {
        # 'try_files' is critical for client-side routing (React Router/TanStack Router).
        # It checks if a physical file ($uri) or directory ($uri/) exists at the root.
        # If they don't, it falls back to serving 'index.html'.
        # Without this, refreshing the browser on a route like '/login' would return a 404.
        try_files $uri $uri/ /index.html;
    }

    # Cache Control for Static Assets
    # Images, CSS, and JS can be heavily cached because Vite generates unique hashes
    # (e.g. index-B4f2a3c8.js) in filenames when there is a change.
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Disable Caching for the main HTML file to ensure users always receive updates
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Error handling pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
