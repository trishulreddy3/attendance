name: Pulse Attendance Production CI/CD Pipeline

on:
  push:
    branches:
      - main
      - ci-test
  pull_request:
    branches:
      - main
      - ci-test

# Concurrency control:
# Prevents multiple deployment runs on the same branch from executing at the same time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================================
  # STAGE 1: Code Verification & Testing (Continuous Integration)
  # ============================================================================
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Frontend Checks ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Auto-Format Code with Prettier
        run: npm run format

      - name: Enforce Code Linting
        run: npm run lint

      - name: Validate Frontend Production Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api
          VITE_WS_URL: /ws

      # --- Backend Checks ---
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile & Package Backend Jar (Verify Java Build)
        run: |
          cd backend
          mvn clean package -DskipTests

  # ============================================================================
  # STAGE 2: Build, Scan & Publish Containers
  # ============================================================================
  build-and-push-images:
    runs-on: ubuntu-latest
    needs: test-and-verify
    # Only push images to the registry on branch merges/pushes (not pull requests)
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repository Owner Name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build frontend and backend locally to run security scanning
      - name: Build Frontend Image (Scan Target)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ghcr.io/${{ env.OWNER_LC }}/pulse-frontend:temp-scan
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_WS_URL=/ws

      - name: Build Backend Image (Scan Target)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: ghcr.io/${{ env.OWNER_LC }}/pulse-backend:temp-scan

      # Run Trivy vulnerability scan
      - name: Run Trivy Security Scan on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER_LC }}/pulse-frontend:temp-scan
          format: 'table'
          exit-code: '0' # Logs critical CVE vulnerabilities but does not block deployment
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Run Trivy Security Scan on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER_LC }}/pulse-backend:temp-scan
          format: 'table'
          exit-code: '0' # Logs critical CVE vulnerabilities but does not block deployment
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # Publish verified, scanned images to the Container Registry (using Git Commit SHA and latest tags)
      - name: Publish Frontend Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/pulse-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/pulse-frontend:sha-${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_WS_URL=/ws

      - name: Publish Backend Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/pulse-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/pulse-backend:sha-${{ github.sha }}

  # ============================================================================
  # STAGE 3: Secure, Source-Free deployment (Continuous Deployment)
  # ============================================================================
  deploy:
    runs-on: self-hosted
    needs: build-and-push-images
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repository Owner Name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      # Deploy locally using host shell commands on the self-hosted runner
      - name: Deploy locally on Jarvis Server
        run: |
          # 1. Create target deploy folder and copy the checked-out compose file to it
          mkdir -p ~/DevOps-Projects/attendance
          cp docker-compose.yml ~/DevOps-Projects/attendance/docker-compose.yml
          cd ~/DevOps-Projects/attendance

          # 2. Dynamically update local environment variables (.env)
          sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=sha-${{ github.sha }}/' .env || echo "IMAGE_TAG=sha-${{ github.sha }}" >> .env
          sed -i 's/^REPOSITORY_OWNER=.*/REPOSITORY_OWNER=${{ env.OWNER_LC }}/' .env || echo "REPOSITORY_OWNER=${{ env.OWNER_LC }}" >> .env

          # 3. Authenticate with GitHub Container Registry (GHCR) locally
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # 4. Pull the newly published versioned images
          docker compose pull

          # 5. Bring updated containers online in-place (no downtime)
          docker compose up -d --remove-orphans

          # 6. Clean dangling layers to preserve host disk space
          docker image prune -f

          # 7. Post-Deployment Verification Health Check
          echo "Awaiting backend container boot..."
          sleep 15
          curl -f http://127.0.0.1:8080/api/auth/me || (echo "Deployment health check failed!" && exit 1)
          echo "Deployment successfully verified!"
